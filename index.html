  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {

      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');

        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather

      }

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.

      // anchors, which closest()/IDL .target get wrong.

            'if (h.charAt(0) !== "#") {' +

              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');

      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.

        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).

        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.

          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');

        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;

        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

ueFor(id) {\n    const s = String(id); let h = 0;\n    for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;\n    return h % 360;\n  }\n  tileGradient(hue) {\n    const t = Component.TILE[this.state.theme] || Component.TILE.aurora;\n    return \"linear-gradient(135deg,oklch(\" + t.l + \" \" + t.c + \" \" + hue + \"),oklch(\" + (t.l - 0.06).toFixed(2) + \" \" + t.c + \" \" + ((hue + 45) % 360) + \"))\";\n  }\n  tileGlow(hue) {\n    const t = Component.TILE[this.state.theme] || Component.TILE.aurora;\n    return \"oklch(\" + t.l + \" \" + t.c + \" \" + hue + \" / 0.45)\";\n  }\n  catColor(hue) {\n    const t = Component.TILE[this.state.theme] || Component.TILE.aurora;\n    return \"oklch(\" + t.l + \" \" + t.c + \" \" + hue + \")\";\n  }\n  faviconUrl(url) {\n    try { return \"https://www.google.com/s2/favicons?domain=\" + new URL(url).hostname + \"&sz=64\"; }\n    catch (e) { return \"\"; }\n  }\n\n  // ── tile modal ──\n  openTileNew(catId) {\n    const cats = this.state.data.categories;\n    this.setState({ tileModal: { id: null, cat: catId || (cats[0] && cats[0].id) || \"\", name: \"\", url: \"\", img: null } });\n  }\n  openTileEdit(id) {\n    const t = this.state.data.tiles.find((x) => x.id === id);\n    if (!t) return;\n    this.setState({ tileModal: { id: t.id, cat: t.cat, name: t.name, url: t.url, img: t.img || null } });\n  }\n  resizeImg(file, cb) {\n    const reader = new FileReader();\n    reader.onload = (ev) => {\n      const img = new Image();\n      img.onload = () => {\n        const canvas = document.createElement(\"canvas\");\n        const MAX_W = 400, MAX_H = 240;\n        let w = img.width, h = img.height;\n        if (w > MAX_W) { h = Math.round(h * MAX_W / w); w = MAX_W; }\n        if (h > MAX_H) { w = Math.round(w * MAX_H / h); h = MAX_H; }\n        canvas.width = w; canvas.height = h;\n        canvas.getContext(\"2d\").drawImage(img, 0, 0, w, h);\n        cb(canvas.toDataURL(\"image/jpeg\", 0.82));\n      };\n      img.src = ev.target.result;\n    };\n    reader.readAsDataURL(file);\n  }\n\n  // ── category modal ──\n  openCatNew() { this.setState({ catModal: { id: null, name: \"\" } }); }\n  openCatEdit(id) {\n    const c = this.state.data.categories.find((x) => x.id === id);\n    if (!c) return;\n    this.setState({ catModal: { id: c.id, name: c.name } });\n  }\n\n  exportData() {\n    const blob = new Blob([JSON.stringify(this.state.data, null, 2)], { type: \"application/json\" });\n    const a = document.createElement(\"a\");\n    a.href = URL.createObjectURL(blob);\n    a.download = \"speeddial_backup.json\";\n    a.click();\n  }\n\n  renderVals() {\n    const tmin = this.props.tileMinWidth ?? 150;\n    const themeVars = Component.THEMES[this.state.theme] || Component.THEMES.aurora;\n    const rootStyle = themeVars + \"--tilemin:\" + tmin + \"px;font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;width:100%;position:relative;overflow-x:hidden;background:var(--bg-base);--px:0;--py:0;\";\n\n    const themes = [\"aurora\", \"sunrise\", \"neon\", \"sand\"].map((id) => {\n      const p = Component.PREVIEW[id];\n      const active = this.state.theme === id;\n      return {\n        id, label: p.label, grad: p.grad, glow: p.glow,\n        bg: active ? \"var(--surface-hover)\" : \"transparent\",\n        textColor: active ? \"var(--text)\" : \"var(--muted)\",\n        onClick: () => this.setTheme(id)\n      };\n    });\n\n    const animated = this.state.animated;\n    let gi = 0;\n    const cats = this.state.data.categories.map((cat) => {\n      const hue = this.hueFor(cat.id);\n      const tiles = this.state.data.tiles.filter((t) => t.cat === cat.id).map((t) => {\n        const hasImg = !!t.img;\n        const dly = (Math.min(gi++, 28) * 0.035).toFixed(3) + \"s\";\n        return {\n          id: t.id, name: t.name, url: t.url,\n          hasImg, noImg: !hasImg, img: t.img || \"\",\n          favicon: this.faviconUrl(t.url),\n          initial: (t.name || \"?\").trim().charAt(0).toUpperCase(),\n          gradient: this.tileGradient(hue),\n          glow: this.tileGlow(hue),\n          entrance: animated ? (\"opacity:0;animation:tileIn .5s cubic-bezier(.22,1,.36,1) both;animation-delay:\" + dly + \";\") : \"opacity:1;\"\n        };\n      });\n      return { id: cat.id, name: cat.name, color: this.catColor(hue), tiles };\n    });\n    const heroAnim = animated ? \"opacity:0;animation:heroIn .7s cubic-bezier(.22,1,.36,1) both;\" : \"opacity:1;\";\n\n    const tileEl = (e) => e.currentTarget.closest(\"[data-tile]\");\n    const catEl = (e) => e.currentTarget.closest(\"[data-cat]\");\n    const DEF_SH = \"0 4px 18px rgba(0,0,0,0.18)\";\n    const fx = () => this.props.maxEffects ?? true;\n\n    const tm = this.state.tileModal;\n    const cm = this.state.catModal;\n\n    return {\n      rootStyle,\n      heroAnim,\n      themes,\n      cats,\n      hasCats: cats.length > 0,\n      noCats: cats.length === 0,\n      clock: this.clockParts(),\n      showSeconds: this.props.showSeconds ?? true,\n      search: this.state.search,\n\n      onRootMove: (e) => {\n        if (!fx()) return;\n        const px = (e.clientX / window.innerWidth - 0.5) * 2;\n        const py = (e.clientY / window.innerHeight - 0.5) * 2;\n        e.currentTarget.style.setProperty(\"--px\", px.toFixed(3));\n        e.currentTarget.style.setProperty(\"--py\", py.toFixed(3));\n      },\n\n      onSearchChange: (e) => this.setState({ search: e.target.value }),\n      onSearchKey: (e) => {\n        if (e.key === \"Enter\") {\n          const q = e.target.value.trim();\n          if (q) window.open(\"https://www.google.com/search?q=\" + encodeURIComponent(q), \"_blank\");\n        }\n      },\n\n      onOpenCat: () => this.openCatNew(),\n      onExport: () => this.exportData(),\n      onImportChange: (e) => {\n        const file = e.target.files[0]; if (!file) return;\n        const reader = new FileReader();\n        reader.onload = (ev) => {\n          try {\n            const imp = JSON.parse(ev.target.result);\n            if (imp.categories && imp.tiles) this.setData(imp);\n            else alert(\"Fichier invalide.\");\n          } catch (err) { alert(\"Erreur de lecture.\"); }\n        };\n        reader.readAsText(file);\n        e.target.value = \"\";\n      },\n\n      // ── tiles: tilt + sheen ──\n      onTileMove: (e) => {\n        const el = e.currentTarget;\n        if (this.dragTileId) return;\n        if (!fx()) { el.style.boxShadow = \"0 18px 40px rgba(0,0,0,0.32)\"; el.style.borderColor = \"var(--accent)\"; return; }\n        const r = el.getBoundingClientRect();\n        const x = (e.clientX - r.left) / r.width;\n        const y = (e.clientY - r.top) / r.height;\n        const rx = (0.5 - y) * 10, ry = (x - 0.5) * 10;\n        el.style.transform = \"perspective(800px) rotateX(\" + rx.toFixed(2) + \"deg) rotateY(\" + ry.toFixed(2) + \"deg) translateY(-5px) scale(1.04)\";\n        el.style.zIndex = \"5\";\n        el.style.boxShadow = \"0 18px 42px rgba(0,0,0,0.35)\";\n        el.style.borderColor = \"var(--accent)\";\n        const sh = el.querySelector(\"[data-sheen]\");\n        if (sh) { sh.style.opacity = \"1\"; sh.style.setProperty(\"--gx\", (x * 100).toFixed(1) + \"%\"); sh.style.setProperty(\"--gy\", (y * 100).toFixed(1) + \"%\"); }\n        const eb = el.querySelector(\"[data-edit]\"); if (eb) eb.style.opacity = \"1\";\n      },\n      onTileLeave: (e) => {\n        const el = e.currentTarget;\n        el.style.transform = \"\";\n        el.style.zIndex = \"\";\n        el.style.boxShadow = DEF_SH;\n        el.style.borderColor = \"\";\n        const sh = el.querySelector(\"[data-sheen]\"); if (sh) sh.style.opacity = \"0\";\n        const eb = el.querySelector(\"[data-edit]\"); if (eb) eb.style.opacity = \"0\";\n      },\n      onTileClick: (e) => { if (this.didDrag) { e.preventDefault(); e.stopPropagation(); } },\n      onTileEdit: (e) => { e.preventDefault(); e.stopPropagation(); this.openTileEdit(tileEl(e).dataset.tile); },\n      onAddTile: (e) => this.openTileNew(catEl(e).dataset.cat),\n      onFaviconLoad: (e) => { e.target.style.opacity = \"1\"; },\n      onFaviconError: (e) => { e.target.style.display = \"none\"; },\n\n      // ── tile drag ──\n      onTileDragStart: (e) => {\n        e.stopPropagation();\n        this.dragTileId = e.currentTarget.dataset.tile;\n        this.dragCatId = null;\n        e.dataTransfer.effectAllowed = \"move\";\n        try { e.dataTransfer.setData(\"text/plain\", this.dragTileId); } catch (er) {}\n        const el = e.currentTarget;\n        el.style.transform = \"\";\n        setTimeout(() => { el.style.opacity = \"0.3\"; }, 0);\n      },\n      onTileDragEnd: (e) => {\n        e.currentTarget.style.opacity = \"\";\n        document.querySelectorAll(\"[data-tile]\").forEach((t) => (t.style.boxShadow = DEF_SH));\n        setTimeout(() => { this.dragTileId = null; this.didDrag = false; }, 50);\n      },\n      onTileDragOver: (e) => {\n        if (!this.dragTileId) return;\n        e.preventDefault(); e.stopPropagation();\n        document.querySelectorAll(\"[data-tile]\").forEach((t) => (t.style.boxShadow = DEF_SH));\n        const el = tileEl(e); const r = el.getBoundingClientRect();\n        const before = e.clientX < r.left + r.width / 2;\n        el.style.boxShadow = (before ? \"inset 4px 0 0 0 var(--accent),\" : \"inset -4px 0 0 0 var(--accent),\") + DEF_SH;\n      },\n      onTileDrop: (e) => {\n        e.preventDefault(); e.stopPropagation();\n        document.querySelectorAll(\"[data-tile]\").forEach((t) => (t.style.boxShadow = DEF_SH));\n        const el = tileEl(e); const targetId = el.dataset.tile;\n        if (!this.dragTileId || this.dragTileId === targetId) return;\n        const r = el.getBoundingClientRect();\n        const before = e.clientX < r.left + r.width / 2;\n        const data = this.clone();\n        const targetCat = data.tiles.find((t) => t.id === targetId).cat;\n        const fromIdx = data.tiles.findIndex((t) => t.id === this.dragTileId);\n        const [moved] = data.tiles.splice(fromIdx, 1);\n        moved.cat = targetCat;\n        const toIdx = data.tiles.findIndex((t) => t.id === targetId);\n        data.tiles.splice(before ? toIdx : toIdx + 1, 0, moved);\n        this.didDrag = true;\n        this.setData(data);\n      },\n      onGridDragOver: (e) => { if (this.dragTileId) e.preventDefault(); },\n      onGridDrop: (e) => {\n        if (!this.dragTileId) return;\n        if (e.target.closest(\"[data-tile]\")) return;\n        const catId = catEl(e).dataset.cat;\n        const data = this.clone();\n        const tile = data.tiles.find((t) => t.id === this.dragTileId);\n        if (tile) { tile.cat = catId; this.didDrag = true; this.setData(data); }\n      },\n\n      // ── category drag ──\n      onCatHandleDown: (e) => { const sec = catEl(e); if (sec) sec.draggable = true; },\n      onCatDragStart: (e) => {\n        const sec = e.currentTarget;\n        if (this.dragTileId || e.target.closest(\"[data-tile]\") || !sec.draggable) { e.preventDefault(); return; }\n        this.dragCatId = sec.dataset.cat;\n        this.dragTileId = null;\n        this.didDrag = true;\n        e.dataTransfer.effectAllowed = \"move\";\n        try { e.dataTransfer.setData(\"text/plain\", this.dragCatId); } catch (er) {}\n        setTimeout(() => { sec.style.opacity = \"0.4\"; }, 0);\n      },\n      onCatDragOver: (e) => {\n        if (!this.dragCatId) return;\n        const sec = e.currentTarget;\n        if (sec.dataset.cat === this.dragCatId) return;\n        e.preventDefault();\n        document.querySelectorAll(\"[data-cat]\").forEach((c) => (c.style.boxShadow = \"\"));\n        const r = sec.getBoundingClientRect();\n        const before = e.clientY < r.top + r.height / 2;\n        sec.style.boxShadow = before ? \"inset 0 3px 0 0 var(--accent)\" : \"inset 0 -3px 0 0 var(--accent)\";\n      },\n      onCatDrop: (e) => {\n        if (!this.dragCatId) return;\n        const sec = e.currentTarget;\n        document.querySelectorAll(\"[data-cat]\").forEach((c) => (c.style.boxShadow = \"\"));\n        if (sec.dataset.cat === this.dragCatId) return;\n        e.preventDefault();\n        const r = sec.getBoundingClientRect();\n        const before = e.clientY < r.top + r.height / 2;\n        const data = this.clone();\n        const fromIdx = data.categories.findIndex((c) => c.id === this.dragCatId);\n        const [moved] = data.categories.splice(fromIdx, 1);\n        const toIdx = data.categories.findIndex((c) => c.id === sec.dataset.cat);\n        data.categories.splice(before ? toIdx : toIdx + 1, 0, moved);\n        this.setData(data);\n      },\n      onCatDragEnd: (e) => {\n        e.currentTarget.draggable = false;\n        e.currentTarget.style.opacity = \"\";\n        document.querySelectorAll(\"[data-cat]\").forEach((c) => (c.style.boxShadow = \"\"));\n        this.dragCatId = null;\n        setTimeout(() => { this.didDrag = false; }, 50);\n      },\n      onCatEdit: (e) => this.openCatEdit(catEl(e).dataset.cat),\n      onCatDelete: (e) => {\n        const id = catEl(e).dataset.cat;\n        const hasTiles = this.state.data.tiles.some((t) => t.cat === id);\n        if (hasTiles && !confirm(\"Cette catégorie contient des raccourcis. Tout supprimer ?\")) return;\n        if (!hasTiles && !confirm(\"Supprimer cette catégorie ?\")) return;\n        const data = this.clone();\n        data.categories = data.categories.filter((c) => c.id !== id);\n        data.tiles = data.tiles.filter((t) => t.cat !== id);\n        this.setData(data);\n      },\n\n      // ── tile modal state ──\n      tileModalOpen: !!tm,\n      tm: tm ? {\n        title: tm.id ? \"Modifier le raccourci\" : \"Nouveau raccourci\",\n        name: tm.name, url: tm.url, cat: tm.cat,\n        hasImg: !!tm.img, img: tm.img || \"\",\n        showDelete: !!tm.id,\n        cats: this.state.data.categories.map((c) => ({ id: c.id, name: c.name }))\n      } : { cats: [] },\n      onTmName: (e) => this.setState({ tileModal: { ...this.state.tileModal, name: e.target.value } }),\n      onTmUrl: (e) => this.setState({ tileModal: { ...this.state.tileModal, url: e.target.value } }),\n      onTmCat: (e) => this.setState({ tileModal: { ...this.state.tileModal, cat: e.target.value } }),\n      onTmImg: (e) => {\n        const file = e.target.files[0]; if (!file) return;\n        this.resizeImg(file, (url) => this.setState({ tileModal: { ...this.state.tileModal, img: url } }));\n        e.target.value = \"\";\n      },\n      onTmClearImg: () => this.setState({ tileModal: { ...this.state.tileModal, img: null } }),\n      onTileCancel: () => this.setState({ tileModal: null }),\n      onTileOverlayClick: (e) => { if (e.target === e.currentTarget) this.setState({ tileModal: null }); },\n      onTileSave: () => {\n        const m = this.state.tileModal;\n        const name = (m.name || \"\").trim();\n        let url = (m.url || \"\").trim();\n        if (!name || !url) return;\n        if (!/^https?:\\/\\//i.test(url)) url = \"https://\" + url;\n        const data = this.clone();\n        if (m.id) {\n          const t = data.tiles.find((x) => x.id === m.id);\n          t.name = name; t.url = url; t.cat = m.cat; t.img = m.img || null;\n        } else {\n          data.tiles.push({ id: \"t\" + Date.now(), name, url, cat: m.cat, img: m.img || null });\n        }\n        this.setData(data);\n        this.setState({ tileModal: null });\n      },\n      onTileDelete: () => {\n        const m = this.state.tileModal;\n        if (!m.id || !confirm(\"Supprimer ce raccourci ?\")) return;\n        const data = this.clone();\n        data.tiles = data.tiles.filter((t) => t.id !== m.id);\n        this.setData(data);\n        this.setState({ tileModal: null });\n      },\n\n      // ── category modal state ──\n      catModalOpen: !!cm,\n      cm: cm ? { title: cm.id ? \"Renommer la catégorie\" : \"Nouvelle catégorie\", name: cm.name } : {},\n      onCmName: (e) => this.setState({ catModal: { ...this.state.catModal, name: e.target.value } }),\n      onCmKey: (e) => { if (e.key === \"Enter\") this.saveCatFromState(); },\n      onCatCancel: () => this.setState({ catModal: null }),\n      onCatOverlayClick: (e) => { if (e.target === e.currentTarget) this.setState({ catModal: null }); },\n      onCatSave: () => this.saveCatFromState()\n    };\n  }\n\n  saveCatFromState() {\n    const m = this.state.catModal;\n    if (!m) return;\n    const name = (m.name || \"\").trim();\n    if (!name) return;\n    const data = this.clone();\n    if (m.id) {\n      data.categories.find((c) => c.id === m.id).name = name;\n    } else {\n      data.categories.push({ id: \"cat_\" + Date.now(), name });\n    }\n    this.setData(data);\n    this.setState({ catModal: null });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"SpeedDial.dc"}
