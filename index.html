<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SpeedDial</title>
<meta name="description" content="Tableau de bord de raccourcis personnalisé">
<meta name="theme-color" content="#0a0e1a" id="metaThemeColor">

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<!-- iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SpeedDial">
<link rel="apple-touch-icon" href="icon-512.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-base);
    color: var(--text);
    min-height: 100vh;
  }
  .bg-blobs {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  @keyframes blob1 {
    0%,100% { transform: translate(0,0) scale(1); }
    33%      { transform: translate(6vw, 8vh) scale(1.08); }
    66%      { transform: translate(-4vw, 5vh) scale(0.94); }
  }
  @keyframes blob2 {
    0%,100% { transform: translate(0,0) scale(1); }
    33%      { transform: translate(-8vw,-6vh) scale(1.06); }
    66%      { transform: translate(5vw,-3vh) scale(0.96); }
  }
  @keyframes blob3 {
    0%,100% { transform: translate(-50%,-50%) scale(1); }
    33%      { transform: translate(calc(-50% + 5vw), calc(-50% - 7vh)) scale(1.1); }
    66%      { transform: translate(calc(-50% - 6vw), calc(-50% + 4vh)) scale(0.92); }
  }

  .bg-blobs::before, .bg-blobs::after, .bg-blob3 {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
  }
  .bg-blobs::before {
    width: 70vw; height: 70vw;
    top: -20%; left: -15%;
    background: var(--b1);
    animation: blob1 18s ease-in-out infinite;
  }
  .bg-blobs::after {
    width: 60vw; height: 60vw;
    bottom: -20%; right: -15%;
    background: var(--b2);
    animation: blob2 22s ease-in-out infinite;
  }
  .bg-blob3 {
    width: 40vw; height: 40vw;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    background: var(--b3);
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    animation: blob3 26s ease-in-out infinite;
  }
  @media (prefers-reduced-motion: reduce) {
    .bg-blobs::before, .bg-blobs::after, .bg-blob3 { animation: none; }
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    position: sticky;
    top: 0;
    z-index: 400;
    backdrop-filter: var(--blur);
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    gap: 16px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.05em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .logo span { color: var(--accent); }

  .header-center {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    justify-content: center;
  }

  .theme-dots {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 4px;
    gap: 2px;
    backdrop-filter: var(--blur);
  }
  .theme-dot {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 32px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.18s, color 0.18s;
    white-space: nowrap;
  }
  .theme-dot:hover { color: var(--text); }
  .theme-dot.active {
    background: var(--surface-hover, rgba(255,255,255,0.18));
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
  }
  .theme-dot-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    display: inline-block;
  }

  .header-actions { display: flex; gap: 8px; flex-shrink: 0; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .btn-ghost {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { filter: brightness(1.12); transform: translateY(-1px); }
  .btn-danger { background: #f75f5f; color: #fff; }
  .btn-danger:hover { filter: brightness(1.1); }

  /* ── HERO ── */
  .hero {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 52px 32px 36px;
  }
  .hero-greet {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.02em;
  }
  .hero-clock {
    font-family: 'Playfair Display', serif;
    font-size: clamp(48px, 8vw, 88px);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1;
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
  }
  .hero-clock-sec {
    font-size: 0.38em;
    color: var(--muted);
    letter-spacing: 0;
    font-weight: 400;
    min-width: 2ch;
  }
  .hero-date {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .hero-search {
    margin: 28px auto 0;
    max-width: 520px;
    position: relative;
  }
  .hero-search input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 13px 24px 13px 48px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    backdrop-filter: var(--blur);
  }
  .hero-search input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
  }
  .hero-search input::placeholder { color: var(--muted); }
  .hero-search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  /* ── MAIN ── */
  main {
    position: relative;
    z-index: 1;
    isolation: isolate;
    padding: 8px 32px 80px;
  }

  /* ── CATEGORIES ── */
  .categories { display: flex; flex-direction: column; gap: 36px; }

  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .cat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .category-name {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }
  .category-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .cat-actions { display: flex; gap: 6px; }
  .cat-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }
  .cat-btn:hover { color: var(--text); background: var(--surface); }
  .cat-btn.danger:hover { color: #f75f5f; }

  /* ── TILES GRID ── */
  .tiles {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 14px;
  }
  @media (max-width: 1100px) { .tiles { grid-template-columns: repeat(5, 1fr); } }
  @media (max-width: 860px)  { .tiles { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 620px)  { .tiles { grid-template-columns: repeat(3, 1fr); } }

  @keyframes tileIn {
    from { opacity: 0; transform: translateY(14px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .tile {
    --tx: 0deg;
    --ty: 0deg;
    --ts: 1;
    --gx: 50%;
    --gy: 50%;
    background: linear-gradient(145deg, rgba(255,255,255,0.09) 0%, var(--surface) 60%);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    position: relative;
    transform: perspective(600px) rotateX(var(--tx)) rotateY(var(--ty)) scale(var(--ts));
    transform-style: preserve-3d;
    transition: transform 0.22s cubic-bezier(0.23,1,0.32,1), box-shadow 0.22s, border-color 0.22s;
    overflow: hidden;
    backdrop-filter: blur(14px) saturate(1.6);
    -webkit-backdrop-filter: blur(14px) saturate(1.6);
    will-change: transform;
  }
  /* Reflet spéculaire haut */
  .tile::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at var(--gx) var(--gy), rgba(255,255,255,0.22) 0%, transparent 65%);
    border-radius: inherit;
    pointer-events: none;
    z-index: 1;
    transition: opacity 0.2s;
    opacity: 0;
  }
  .tile:hover::before, .tile.tilt-active::before { opacity: 1; }
  /* Bord lumineux */
  .tile::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    border: 1px solid rgba(255,255,255,0.25);
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.22s;
  }
  .tile:hover::after, .tile.tilt-active::after { opacity: 1; }

  .tile.animate-in { animation: tileIn 0.32s ease both; }
  .tile:hover {
    --ts: 1.02;
    box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,0.1) inset;
    border-color: var(--accent);
  }
  .tiles.magnify-active .tile:hover {
    --ts: 1;
    box-shadow: none;
    border-color: rgba(255,255,255,0.14);
  }

  .tile-top {
    width: 100%;
    height: 76px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 14px 14px 0 0;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }
  .tile-top img.tile-preview-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    display: block;
  }
  .tile-favicon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    object-fit: contain;
  }
  .tile-initial {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: rgba(255,255,255,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 20px;
    color: #fff;
  }

  .tile-body {
    padding: 10px 12px 12px;
    width: 100%;
  }
  .tile-title {
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    width: 100%;
    color: var(--text);
    display: block;
  }

  .tile-edit-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,0.45);
    border: none;
    color: #fff;
    width: 22px;
    height: 22px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    display: none;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    z-index: 2;
  }
  .tile:hover .tile-edit-btn { display: flex; }
  .tile-edit-btn:hover { background: rgba(0,0,0,0.7); }

  /* ── ADD TILE BUTTON ── */
  .tile-add {
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    color: var(--muted);
    min-height: 116px;
    transition: all 0.18s;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
  }
  .tile-add:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: color-mix(in srgb, var(--accent) 6%, transparent);
  }
  .tile-add-icon { font-size: 22px; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  @keyframes modalIn {
    from { opacity: 0; transform: translateY(16px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal {
    background: var(--modal-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow);
    animation: modalIn 0.22s ease;
  }
  .modal h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 20px;
    color: var(--text);
  }

  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.18s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: var(--modal-bg); }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 22px;
  }

  /* ── MISC ── */
  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 60px 0;
  }
  .drag-handle {
    cursor: grab;
    color: var(--muted);
    padding: 2px 6px;
    font-size: 14px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
    user-select: none;
  }
  .drag-handle:hover { color: var(--text); background: var(--surface); }
  .drag-handle:active { cursor: grabbing; }

  .tile.tile-dragging { opacity: 0.3; transform: scale(0.92); }
  .tile.drop-before { box-shadow: -3px 0 0 0 var(--accent) !important; }
  .tile.drop-after  { box-shadow:  3px 0 0 0 var(--accent) !important; }
  .category.cat-dragging { opacity: 0.3; }
  .category.cat-drop-before { border-top: 2px solid var(--accent); margin-top: -2px; }
  .category.cat-drop-after  { border-bottom: 2px solid var(--accent); }

  /* ── APERÇU HOVER ── */
  .tile-tooltip {
    position: fixed;
    z-index: 150;
    pointer-events: none;
    width: 220px;
    background: var(--modal-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    overflow: hidden;
    opacity: 0;
    transform: translateY(6px) scale(0.97);
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  .tile-tooltip.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .tt-img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    object-position: top;
    display: block;
    background: var(--surface);
  }
  .tt-body {
    padding: 10px 12px 11px;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .tt-favicon {
    width: 20px; height: 20px;
    border-radius: 5px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .tt-info { min-width: 0; }
  .tt-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tt-url {
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tt-no-img {
    width: 100%;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
  }

  /* Désactivé sur mobile (pas de hover) */
  @media (max-width: 640px) { .tile-tooltip { display: none !important; } }

  /* ── PALETTE DE COMMANDE ── */
  .palette-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    z-index: 300;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding-top: 12vh;
  }
  .palette-overlay.open { display: flex; }

  .palette-box {
    width: 100%;
    max-width: 580px;
    background: var(--modal-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    overflow: hidden;
    animation: palIn 0.18s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes palIn {
    from { opacity:0; transform: scale(0.96) translateY(-8px); }
    to   { opacity:1; transform: scale(1)    translateY(0); }
  }

  .palette-search-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
  }
  .palette-search-icon { color: var(--accent); font-size: 18px; flex-shrink: 0; }
  #paletteInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
  }
  #paletteInput::placeholder { color: var(--muted); }
  .palette-kbd {
    font-size: 11px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    flex-shrink: 0;
    cursor: pointer;
  }

  .palette-meta {
    font-size: 11px;
    color: var(--muted);
    padding: 8px 18px 4px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .palette-results {
    max-height: 360px;
    overflow-y: auto;
    padding: 4px 8px 8px;
  }

  .pal-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.1s;
    text-decoration: none;
    color: var(--text);
  }
  .pal-item.sel,
  .pal-item:hover {
    background: color-mix(in srgb, var(--accent) 10%, transparent);
    outline: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
  }
  .pal-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden;
  }
  .pal-icon img { width: 26px; height: 26px; object-fit: contain; }
  .pal-icon .pal-letter {
    font-weight: 700; font-size: 17px; color: #fff;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .pal-info { flex: 1; min-width: 0; }
  .pal-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pal-name mark { background: none; color: var(--accent); font-weight: 700; }
  .pal-url  { font-size: 11px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pal-cat  { font-size: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; color: var(--muted); flex-shrink: 0; }

  .pal-pinned-badge { font-size: 13px; flex-shrink: 0; }

  .pal-empty { text-align: center; color: var(--muted); font-size: 13px; padding: 32px 0; }

  .palette-footer {
    display: flex;
    gap: 16px;
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    justify-content: flex-end;
  }
  .pal-hint { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .pal-hint kbd {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 5px; padding: 1px 6px;
    font-family: 'Space Mono', monospace; font-size: 10px;
  }

  /* Bouton ⌕ dans le header (toujours visible) */
  .btn-palette {
    background: color-mix(in srgb, var(--accent) 14%, var(--surface));
    border-color: color-mix(in srgb, var(--accent) 28%, var(--border));
    color: var(--accent);
  }
  .btn-palette:hover {
    background: color-mix(in srgb, var(--accent) 22%, var(--surface));
    color: var(--accent);
  }

  /* Mobile : bottom sheet */
  @media (max-width: 640px) {
    .palette-overlay { padding-top: 0; align-items: flex-end; }
    .palette-box {
      border-radius: 24px 24px 0 0;
      border-bottom: none;
      max-width: 100%;
      animation: palUp 0.22s cubic-bezier(0.32,0.72,0,1);
    }
    @keyframes palUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .palette-results { max-height: 52vh; }
    .pal-item { min-height: 52px; }
    #paletteInput { font-size: 17px; }
  }

  /* ── DOCK (FAVORIS ÉPINGLÉS) ── */
  .pinned-section {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    display: none;
  }

  .dock-bar {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 10px 16px;
    background: var(--dock-bg, rgba(255,255,255,0.12));
    backdrop-filter: blur(24px) saturate(1.8);
    -webkit-backdrop-filter: blur(24px) saturate(1.8);
    border: 1px solid var(--dock-border, rgba(255,255,255,0.18));
    border-radius: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.1) inset;
  }

  .dock-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    text-decoration: none;
    cursor: pointer;
    position: relative;
    transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
    transform-origin: bottom center;
  }

  .dock-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: box-shadow 0.18s;
  }
  .dock-icon img {
    width: 32px;
    height: 32px;
    object-fit: contain;
  }

  .dock-label {
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: var(--dock-label, rgba(0,0,0,0.75));
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    padding: 4px 10px;
    border-radius: 8px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s, transform 0.15s;
  }
  .dock-label::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--dock-label, rgba(0,0,0,0.75));
  }
  .dock-item:hover .dock-label {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .dock-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    margin-top: 2px;
  }

  /* Bouton épingle sur les tuiles */
  .tile-pin-btn {
    position: absolute;
    top: 6px;
    left: 6px;
    background: rgba(0,0,0,0.45);
    border: none;
    color: #fff;
    width: 22px; height: 22px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    display: none;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    z-index: 2;
    line-height: 1;
  }
  .tile:hover .tile-pin-btn { display: flex; }
  .tile-pin-btn:hover { background: rgba(0,0,0,0.7); }
  .tile-pin-btn.pinned { display: flex; color: gold; }

  /* espace en bas pour ne pas masquer le contenu */
  body.has-dock main { padding-bottom: 110px; }

  @media (max-width: 640px) {
    .dock-icon { width: 44px; height: 44px; border-radius: 12px; font-size: 18px; }
    .dock-bar { gap: 8px; padding: 8px 12px; }
    .pinned-section { bottom: 12px; }
  }

  /* ── MENU CONTEXTUEL ── */
  .ctx-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
  }
  .ctx-menu {
    display: none;
    position: fixed;
    bottom: -100%;
    left: 16px; right: 16px;
    background: var(--modal-bg);
    border: 1px solid var(--border);
    border-radius: 20px 20px 16px 16px;
    padding: 8px 8px 16px;
    z-index: 501;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.4);
    transition: bottom 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }
  .ctx-menu.open {
    display: block;
    bottom: 16px;
  }
  .ctx-overlay.open { display: block; }
  .ctx-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-align: center;
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ctx-item {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 14px 18px;
    background: none;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    text-align: left;
    transition: background 0.15s;
  }
  .ctx-item:hover, .ctx-item:active { background: var(--surface-hover); }
  .ctx-item.danger { color: #ff5f5f; }
  .ctx-item span:first-child { font-size: 18px; width: 24px; text-align: center; }
  .ctx-sep { height: 1px; background: var(--border); margin: 4px 8px; }

  /* ── MODE ÉDITION GLOBAL ── */
  @keyframes wiggle {
    0%,100% { transform: perspective(600px) rotateZ(-1.2deg) scale(var(--ts,1)); }
    50%      { transform: perspective(600px) rotateZ(1.2deg)  scale(var(--ts,1)); }
  }
  body.edit-mode .tile:not(.tile-add) {
    animation: wiggle 0.55s ease-in-out infinite;
  }
  body.edit-mode .tile .tile-pin-btn  { display: flex !important; }
  body.edit-mode .tile .tile-edit-btn { display: flex !important; }
  body.edit-mode .drag-handle         { opacity: 1 !important; pointer-events: auto !important; }
  #editModeBtn.active { color: var(--accent); border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }

  /* ── PAGER CATÉGORIES (mobile) ── */
  .cat-pager {
    display: none;
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 190;
    gap: 6px;
    align-items: center;
    justify-content: center;
  }
  .cat-pager-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: width 0.2s, background 0.2s;
    cursor: pointer;
  }
  .cat-pager-dot.active {
    width: 18px;
    border-radius: 3px;
    background: var(--accent);
  }

  @media (max-width: 640px) {
    main { padding: 0; overflow: hidden; }
    .categories {
      flex-direction: row;
      overflow-x: scroll;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      gap: 0;
    }
    .categories::-webkit-scrollbar { display: none; }
    .category {
      flex-shrink: 0;
      width: 100vw;
      padding: 12px 12px 100px;
      scroll-snap-align: start;
    }
    .cat-pager { display: flex; }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 3px; }

  /* ════════════════════════════════════
     RESPONSIVE MOBILE  (≤ 640px)
     ════════════════════════════════════ */
  @media (max-width: 640px) {

    /* Header : logo + menu burger, plus de boutons exposés */
    header {
      padding: 12px 16px;
      gap: 10px;
    }
    .logo { font-size: 12px; }

    .header-center { display: none; }   /* thèmes → menu burger */

    .header-actions { gap: 6px; }
    .header-actions .btn span { display: none; } /* texte masqué */
    .btn-ghost { padding: 8px 10px; font-size: 16px; }

    /* Bouton burger pour thèmes */
    .burger-btn {
      display: flex !important;
    }

    /* Hero : horloge réduite, salutation masquée */
    .hero { padding: 24px 16px 20px; }
    .hero-greet { display: none; }
    .hero-clock { font-size: clamp(36px, 14vw, 56px); }
    .hero-clock-sec { font-size: 0.42em; }
    .hero-date { font-size: 10px; margin-top: 6px; }

    /* Barre de recherche pleine largeur */
    .hero-search { margin-top: 18px; }
    .hero-search input { padding: 13px 20px 13px 44px; font-size: 15px; }

    /* Main */
    main { padding: 12px 12px 80px; }

    /* Catégories */
    .categories { gap: 24px; }
    .category-name { font-size: 10px; }

    /* Grille : 3 colonnes sur mobile */
    .tiles { grid-template-columns: repeat(3, 1fr); gap: 10px; }

    /* Tuiles : plus hautes pour le toucher */
    .tile-top { height: 64px; }
    .tile-body { padding: 8px 8px 10px; }
    .tile-title { font-size: 11px; }
    .tile-favicon { width: 32px; height: 32px; }
    .tile-initial { width: 36px; height: 36px; font-size: 16px; border-radius: 10px; }

    /* Bouton ajouter */
    .tile-add { min-height: 98px; font-size: 11px; }
    .tile-add-icon { font-size: 18px; }

    /* Masquer les poignées drag sur mobile (pas pratique) */
    .drag-handle { display: none; }

    /* Modals pleine largeur */
    .modal { border-radius: 20px 20px 0 0; max-width: 100%; margin-top: auto; }
    .modal-overlay { align-items: flex-end; }
  }

  /* Menu thèmes mobile (drawer) */
  .burger-btn {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    padding: 8px 10px;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .theme-drawer {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    background: var(--modal-bg);
    border-bottom: 1px solid var(--border);
    padding: 20px 16px 16px;
    z-index: 30;
    backdrop-filter: var(--blur);
    animation: drawerDown 0.2s ease;
  }
  @keyframes drawerDown {
    from { transform: translateY(-100%); opacity: 0; }
    to   { transform: translateY(0);     opacity: 1; }
  }
  .theme-drawer.open { display: block; }

  .theme-drawer-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .theme-drawer-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .theme-drawer-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: 12px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.15s;
  }
  .theme-drawer-item.active {
    border-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 10%, var(--surface));
  }
  .theme-drawer-swatch {
    width: 18px; height: 18px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .theme-drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 29;
  }
  .theme-drawer-overlay.open { display: block; }
</style>
</head>
<body>

<div class="bg-blobs"><span class="bg-blob3"></span></div>

<header>
  <div class="logo">SPEED<span>//</span>DIAL</div>
  <div class="header-center">
    <div class="theme-dots" id="themeDots"></div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-palette" onclick="openPalette()" title="Recherche rapide (/)">⌕ <span>Recherche</span></button>
    <button class="btn btn-ghost" onclick="exportData()" title="Exporter">↓ <span>Export</span></button>
    <label class="btn btn-ghost" style="cursor:pointer" title="Importer">↑ <span>Import</span><input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)"></label>
    <button class="btn btn-ghost" onclick="openCatModal()" title="Nouvelle catégorie">+ <span>Catégorie</span></button>
    <button class="btn btn-ghost" id="editModeBtn" onclick="toggleEditMode()" title="Mode édition (E)">✎ <span>Éditer</span></button>
    <button class="burger-btn" onclick="toggleThemeDrawer()" title="Changer de thème">🎨</button>
  </div>
</header>

<!-- Drawer thèmes mobile -->
<div class="theme-drawer-overlay" id="themeDrawerOverlay" onclick="closeThemeDrawer()"></div>
<div class="theme-drawer" id="themeDrawer">
  <div class="theme-drawer-title">Thème</div>
  <div class="theme-drawer-grid" id="themeDrawerGrid"></div>
</div>

<div class="hero">
  <div class="hero-greet" id="heroGreet"></div>
  <div class="hero-clock">
    <span id="clockHM"></span>
    <span class="hero-clock-sec" id="clockSec"></span>
  </div>
  <div class="hero-date" id="heroDate"></div>
  <div class="hero-search">
    <span class="hero-search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Rechercher sur Google…" autocomplete="off">
  </div>
</div>

<!-- Tooltip aperçu hover -->
<div class="tile-tooltip" id="tileTooltip"></div>

<!-- Palette de commande -->
<div class="palette-overlay" id="paletteOverlay" onclick="if(event.target===this)closePalette()">
  <div class="palette-box">
    <div class="palette-search-row">
      <span class="palette-search-icon">⌕</span>
      <input id="paletteInput" placeholder="Rechercher un raccourci…" autocomplete="off" spellcheck="false">
      <span class="palette-kbd" onclick="closePalette()">Esc</span>
    </div>
    <div class="palette-meta" id="paletteMeta">Accès rapide</div>
    <div class="palette-results" id="paletteResults"></div>
    <div class="palette-footer">
      <div class="pal-hint"><kbd>↵</kbd> Ouvrir</div>
      <div class="pal-hint"><kbd>↑↓</kbd> Naviguer</div>
      <div class="pal-hint"><kbd>Esc</kbd> Fermer</div>
    </div>
  </div>
</div>

<!-- Favoris épinglés -->
<div class="pinned-section" id="pinnedSection">
  <div class="dock-bar" id="pinnedGrid"></div>
</div>

<main>
  <div class="categories" id="categoriesContainer"></div>
</main>
<div class="cat-pager" id="catPager"></div>

<!-- Modal Tile -->
<div class="modal-overlay" id="tileModal">
  <div class="modal">
    <h2 id="tileModalTitle">Nouveau raccourci</h2>
    <div class="form-group">
      <label>Nom</label>
      <input type="text" id="tileNameInput" placeholder="Ex: Crédit Agricole">
    </div>
    <div class="form-group">
      <label>URL</label>
      <input type="text" id="tileUrlInput" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>Catégorie</label>
      <select id="tileCatSelect"></select>
    </div>
    <div class="form-group">
      <label>Image d'aperçu <span style="color:var(--muted);font-weight:400">(optionnel)</span></label>
      <div id="tileImgPreviewWrap" style="display:none;margin-bottom:8px;position:relative;">
        <img id="tileImgPreview" style="width:100%;height:90px;object-fit:cover;object-position:top;border-radius:8px;border:1px solid var(--border);">
        <button onclick="clearTileImg()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.6);border:none;color:#fff;border-radius:6px;width:22px;height:22px;cursor:pointer;font-size:12px;">✕</button>
      </div>
      <label class="btn btn-ghost" style="cursor:pointer;width:100%;justify-content:center;">
        📁 Choisir une image
        <input type="file" id="tileImgInput" accept="image/*" style="display:none" onchange="previewTileImg(event)">
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeTileModal()">Annuler</button>
      <button class="btn btn-danger" id="tileDeleteBtn" onclick="deleteCurrentTile()" style="display:none">Supprimer</button>
      <button class="btn btn-primary" onclick="saveTile()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal Catégorie -->
<div class="modal-overlay" id="catModal">
  <div class="modal">
    <h2 id="catModalTitle">Nouvelle catégorie</h2>
    <div class="form-group">
      <label>Nom</label>
      <input type="text" id="catNameInput" placeholder="Ex: Banques">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeCatModal()">Annuler</button>
      <button class="btn btn-danger" id="catDeleteBtn" onclick="deleteCurrentCat()" style="display:none">Supprimer</button>
      <button class="btn btn-primary" onclick="saveCat()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Menu contextuel appui long -->
<div class="ctx-overlay" id="ctxOverlay" onclick="closeCtxMenu()"></div>
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-title" id="ctxTitle"></div>
  <button class="ctx-item" id="ctxPin" onclick="ctxAction('pin')">
    <span id="ctxPinIcon">☆</span><span id="ctxPinLabel">Épingler</span>
  </button>
  <button class="ctx-item" id="ctxEdit" onclick="ctxAction('edit')">
    <span>✎</span><span>Modifier</span>
  </button>
  <div class="ctx-sep"></div>
  <button class="ctx-item danger" onclick="ctxAction('delete')">
    <span>🗑</span><span>Supprimer</span>
  </button>
</div>

<script>
// ── THEMES ──────────────────────────────────────────────

    tile: { l: 0.7, c: 0.16 }
  },
  neon: {
    label: 'Neon',
    dot: 'linear-gradient(135deg,#ff28aa,#28dcff)',
    vars: '--accent:#22e0ff;--text:#eef0ff;--muted:#7e7ea6;--surface:rgba(255,255,255,0.035);--surface-hover:rgba(255,255,255,0.08);--border:rgba(255,255,255,0.09);--blur:blur(9px);--header-bg:rgba(7,7,16,0.55);--input-bg:rgba(255,255,255,0.05);--modal-bg:#10101e;--bg-base:#06060e;--b1:rgba(255,40,170,0.5);--b2:rgba(40,220,255,0.46);--b3:rgba(150,60,255,0.46);--shadow:0 24px 70px rgba(0,0,0,0.7);--dock-bg:rgba(255,255,255,0.07);--dock-border:rgba(255,255,255,0.12);--dock-label:rgba(0,0,0,0.8);',
    tile: { l: 0.66, c: 0.2 }
  },
  sand: {
    label: 'Sand',

// ── OKLCH TILE HELPERS ──────────────────────────────────
function hueFor(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) >>> 0;
  return h % 360;
}
function tileGradient(id) {
  const t = THEMES[currentTheme].tile;
  const hue = hueFor(id);
  return `linear-gradient(135deg,oklch(${t.l} ${t.c} ${hue}),oklch(${(t.l - 0.06).toFixed(2)} ${t.c} ${(hue + 45) % 360}))`;
}
function tileGlow(id) {
  const t = THEMES[currentTheme].tile;
  return `oklch(${t.l} ${t.c} ${hueFor(id)} / 0.45)`;
}

function bindLongPress(el, tile) {

      }

  }, { passive: true });

  el.addEventListener('touchmove', () => { moved = true; clearTimeout(timer); }, { passive: true });
  el.addEventListener('touchend',    () => clearTimeout(timer), { passive: true });
  el.addEventListener('touchcancel', () => clearTimeout(timer), { passive: true });

  // Clic droit sur desktop
  el.addEventListener('contextmenu', e => { e.preventDefault(); openCtxMenu(tile); });
}

function bindTile3D(el, glow) {
  const MAX_TILT = 14;

  function applyTilt(clientX, clientY) {
    const r = el.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const rx = ((clientY - cy) / (r.height / 2)) * -MAX_TILT;
    const ry = ((clientX - cx) / (r.width / 2)) * MAX_TILT;
    const gx = Math.round(((clientX - r.left) / r.width) * 100);
    const gy = Math.round(((clientY - r.top) / r.height) * 100);
    el.style.setProperty('--tx', rx.toFixed(1) + 'deg');
    el.style.setProperty('--ty', ry.toFixed(1) + 'deg');
    el.style.setProperty('--gx', gx + '%');
    el.style.setProperty('--gy', gy + '%');
    el.style.boxShadow = '0 0 0 2px ' + glow + ', 0 20px 40px rgba(0,0,0,0.35)';
    el.classList.add('tilt-active');
  }

  function resetTilt() {
    el.style.setProperty('--tx', '0deg');
    el.style.setProperty('--ty', '0deg');
    el.style.setProperty('--gx', '50%');
    el.style.setProperty('--gy', '50%');
    el.style.boxShadow = '';
    el.classList.remove('tilt-active');
  }

  el.addEventListener('mousemove', e => applyTilt(e.clientX, e.clientY));
  el.addEventListener('mouseleave', resetTilt);

  el.addEventListener('touchmove', e => {
    applyTilt(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  el.addEventListener('touchend', resetTilt);
  el.addEventListener('touchcancel', resetTilt);
}

    });

    bar.appendChild(a);
  });

  initDockMagnify(bar);
  initDockDrag(bar);
}

function initDockMagnify(bar) {
  const items = () => [...bar.querySelectorAll('.dock-item')];
  const MAX_SCALE = 1.55;
  const RADIUS = 110;

  function applyMagnify(clientX) {
    items().forEach(item => {
      const rect = item.querySelector('.dock-icon').getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const dist = Math.abs(clientX - cx);
      const scale = dist < RADIUS ? 1 + (MAX_SCALE - 1) * Math.pow(1 - dist / RADIUS, 1.5) : 1;
      item.style.transform = `scale(${scale.toFixed(3)})`;
    });
  }

  function resetMagnify() {
    items().forEach(item => { item.style.transform = ''; });
  }

  bar.addEventListener('mousemove', e => applyMagnify(e.clientX));
  bar.addEventListener('mouseleave', resetMagnify);

  bar.addEventListener('touchmove', e => {
    e.preventDefault();
    applyMagnify(e.touches[0].clientX);
  }, { passive: false });

  bar.addEventListener('touchend', resetMagnify);
  bar.addEventListener('touchcancel', resetMagnify);
}

function initTilesMagnify(grid) {
  const MAX_SCALE = 1.45;
  const RADIUS = 170;

  function applyMagnify(clientX, clientY) {
    grid.classList.add('magnify-active');
    [...grid.querySelectorAll('.tile')].forEach(tile => {
      const r = tile.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dist = Math.sqrt((clientX - cx) ** 2 + (clientY - cy) ** 2);
      const scale = dist < RADIUS ? 1 + (MAX_SCALE - 1) * Math.pow(1 - dist / RADIUS, 1.8) : 1;
      tile.style.transform = scale > 1.01 ? `scale(${scale.toFixed(3)})` : '';
    });
  }

  function reset() {
    grid.classList.remove('magnify-active');
    [...grid.querySelectorAll('.tile')].forEach(t => { t.style.transform = ''; });
  }

  grid.addEventListener('mousemove', e => applyMagnify(e.clientX, e.clientY));
  grid.addEventListener('mouseleave', reset);

  grid.addEventListener('touchmove', e => {
    applyMagnify(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });

  grid.addEventListener('touchend', reset);
  grid.addEventListener('touchcancel', reset);
}

    container.innerHTML = '<div class="empty-state">Aucune catégorie — clique sur "+ Catégorie" pour commencer.</div>';

  let delay = 0;
  data.categories.forEach(cat => {

    const catHue = hueFor(cat.id);
    const dotColor = 'oklch(0.72 0.15 ' + catHue + ')';

    sec.className = 'category';
    sec.dataset.catId = cat.id;
    sec.innerHTML =
      '<div class="category-header">' +

      '</div>' +
      '<div class="tiles" id="tiles-' + cat.id + '"></div>';
    container.appendChild(sec);

    const grid = sec.querySelector('#tiles-' + cat.id);

    tiles.forEach(tile => {
      const node = makeTileNode(tile, {

  animateOnce = false;
  bindDragDrop();
  renderPinned();
  buildCatPager();

let currentTileId  = null;
let currentTileCat = null;
let currentTileImg = null;

function previewTileImg(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX_W = 400, MAX_H = 240;
      let w = img.width, h = img.height;
      if (w > MAX_W) { h = Math.round(h * MAX_W / w); w = MAX_W; }
      if (h > MAX_H) { w = Math.round(w * MAX_H / h); h = MAX_H; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      currentTileImg = canvas.toDataURL('image/jpeg', 0.82);
      document.getElementById('tileImgPreview').src = currentTileImg;
      document.getElementById('tileImgPreviewWrap').style.display = 'block';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function clearTileImg() {
  currentTileImg = null;
  document.getElementById('tileImgPreview').src = '';
  document.getElementById('tileImgPreviewWrap').style.display = 'none';
}

function openTileModal(tileId, catId) {
  currentTileId = tileId;
  currentTileCat = catId;

    document.getElementById('tileUrlInput').value = tile.url;

    document.getElementById('tileDeleteBtn').style.display = 'inline-flex';
    if (tile.img) {
      currentTileImg = tile.img;
      document.getElementById('tileImgPreview').src = tile.img;
      document.getElementById('tileImgPreviewWrap').style.display = 'block';
    } else { clearTileImg(); }
  } else {
    document.getElementById('tileModalTitle').textContent = 'Nouveau raccourci';
    document.getElementById('tileNameInput').value = '';
    document.getElementById('tileUrlInput').value = '';
    if (catId) select.value = catId;

  setTimeout(() => document.getElementById('tileNameInput').focus(), 80);

  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  if (currentTileId) {
    const tile = data.tiles.find(t => t.id === currentTileId);
    tile.name = name; tile.url = url; tile.cat = cat; tile.img = currentTileImg || null;
  } else {
    data.tiles.push({ id: 't' + Date.now(), name, url, cat, img: currentTileImg || null });
  }
  save(); render(); closeTileModal();
}

function deleteCurrentTile() {
  if (!currentTileId) return;
  if (!confirm('Supprimer ce raccourci ?')) return;
  data.tiles = data.tiles.filter(t => t.id !== currentTileId);
  data.pinned = data.pinned.filter(id => id !== currentTileId);
  save(); render(); closeTileModal();
}

function promptDeleteTile(tileId) {
  if (!confirm('Supprimer ce raccourci ?')) return;
  data.tiles = data.tiles.filter(t => t.id !== tileId);
  data.pinned = data.pinned.filter(id => id !== tileId);
  save(); render();
}

// ── CATEGORY MODAL ────────────────────────────────────
let currentCatId = null;

function openCatModal() {
  currentCatId = null;
  document.getElementById('catModalTitle').textContent = 'Nouvelle catégorie';
  document.getElementById('catNameInput').value = '';
  document.getElementById('catDeleteBtn').style.display = 'none';
  document.getElementById('catModal').classList.add('open');
  setTimeout(() => document.getElementById('catNameInput').focus(), 80);
}
function closeCatModal() { document.getElementById('catModal').classList.remove('open'); }

function editCat(catId) {
  currentCatId = catId;
  const cat = data.categories.find(c => c.id === catId);
  document.getElementById('catModalTitle').textContent = 'Renommer la catégorie';
  document.getElementById('catNameInput').value = cat.name;
  document.getElementById('catDeleteBtn').style.display = 'inline-flex';
  document.getElementById('catModal').classList.add('open');
  setTimeout(() => document.getElementById('catNameInput').focus(), 80);
}

function saveCat() {
  const name = document.getElementById('catNameInput').value.trim();
  if (!name) return;
  if (currentCatId) {
    data.categories.find(c => c.id === currentCatId).name = name;
  } else {
    data.categories.push({ id: 'cat_' + Date.now(), name });
  }
  save(); render(); closeCatModal();
}

function promptDeleteCat(catId) { currentCatId = catId; editCat(catId); }

function deleteCurrentCat() {
  if (!currentCatId) return;
  const hasTiles = data.tiles.some(t => t.cat === currentCatId);
  if (hasTiles && !confirm('Cette catégorie contient des raccourcis. Tout supprimer ?')) return;
  if (!hasTiles && !confirm('Supprimer cette catégorie ?')) return;
  data.categories = data.categories.filter(c => c.id !== currentCatId);
  data.tiles = data.tiles.filter(t => t.cat !== currentCatId);
  save(); render(); closeCatModal();
}

// ── IMPORT / EXPORT ───────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'speeddial_backup.json';
  a.click();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (imported.categories && imported.tiles) {
        data = imported;
        animateOnce = true;
        save(); render();
        showToast('✓ ' + imported.tiles.length + ' raccourcis importés dans ' + imported.categories.length + ' catégories');
      } else { showToast('✗ Fichier invalide — categories et tiles requis'); }
    } catch(err) { showToast('✗ Erreur : ' + err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--modal-bg);color:var(--text);font-family:\'DM Sans\',sans-serif;font-size:14px;padding:13px 26px;border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow);z-index:9999;white-space:nowrap;pointer-events:none;transition:opacity .35s;backdrop-filter:blur(12px)';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3200);
}

// ── CLOSE MODALS ON OVERLAY CLICK ────────────────────
document.getElementById('tileModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeTileModal(); });
document.getElementById('catModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeCatModal(); });

// ── DRAG & DROP ───────────────────────────────────────
let dragTileId = null;
let dragCatId  = null;
let didDrag    = false;

function bindDragDrop() {
  const container = document.getElementById('categoriesContainer');

  container.querySelectorAll('.tile[data-tile-id]').forEach(el => {
    el.addEventListener('dragstart', e => {
      e.stopPropagation();
      dragTileId = el.dataset.tileId; dragCatId = null;
      container.querySelectorAll('.category').forEach(s => s.draggable = false);
      e.dataTransfer.setData('text/plain', dragTileId);
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => el.classList.add('tile-dragging'), 0);
    });
    el.addEventListener('dragend', e => {
      e.stopPropagation();
      el.classList.remove('tile-dragging');
      clearTileHighlights();
      setTimeout(() => { dragTileId = null; didDrag = false; }, 50);
    });
    el.addEventListener('dragover', e => {
      if (!dragTileId) return;
      e.preventDefault(); e.stopPropagation();
      clearTileHighlights();
      const rect = el.getBoundingClientRect();
      el.classList.add(e.clientX < rect.left + rect.width / 2 ? 'drop-before' : 'drop-after');
    });
    el.addEventListener('dragleave', e => { e.stopPropagation(); el.classList.remove('drop-before', 'drop-after'); });
    el.addEventListener('drop', e => {
      e.preventDefault(); e.stopPropagation();
      clearTileHighlights();
      const targetId = el.dataset.tileId;
      if (!dragTileId || dragTileId === targetId) return;
      const rect = el.getBoundingClientRect();
      const before = e.clientX < rect.left + rect.width / 2;
      const targetCat = data.tiles.find(t => t.id === targetId).cat;
      const fromIdx = data.tiles.findIndex(t => t.id === dragTileId);
      const [moved] = data.tiles.splice(fromIdx, 1);
      moved.cat = targetCat;
      const toIdx = data.tiles.findIndex(t => t.id === targetId);
      data.tiles.splice(before ? toIdx : toIdx + 1, 0, moved);
      save(); render();
    });
    el.addEventListener('click', e => { if (didDrag) { e.preventDefault(); e.stopPropagation(); } });
  });

  container.querySelectorAll('.tiles').forEach(grid => {
    grid.addEventListener('dragover', e => { if (!dragTileId) return; e.preventDefault(); });
    grid.addEventListener('drop', e => {
      if (!dragTileId) return;
      if (e.target.closest('.tile[data-tile-id]')) return;
      const catId = grid.id.replace('tiles-', '');
      const tile = data.tiles.find(t => t.id === dragTileId);
      if (tile) { tile.cat = catId; save(); render(); }
    });
  });

  container.querySelectorAll('[data-cat-handle]').forEach(handle => {
    const sec = handle.closest('.category');
    handle.addEventListener('mousedown', () => { sec.draggable = true; });
    handle.addEventListener('mouseup', () => { if (!dragCatId) sec.draggable = false; });
  });

  container.querySelectorAll('.category').forEach(sec => {
    sec.addEventListener('dragstart', e => {
      if (!sec.draggable) { e.preventDefault(); return; }
      dragCatId = sec.dataset.catId; dragTileId = null; didDrag = true;
      e.dataTransfer.setData('text/plain', dragCatId);
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => sec.classList.add('cat-dragging'), 0);
    });
    sec.addEventListener('dragend', () => {
      sec.draggable = false; sec.classList.remove('cat-dragging');
      clearCatHighlights(); dragCatId = null;
      setTimeout(() => { didDrag = false; }, 50);
    });
    sec.addEventListener('dragover', e => {
      if (!dragCatId || dragCatId === sec.dataset.catId) return;
      e.preventDefault(); clearCatHighlights();
      const rect = sec.getBoundingClientRect();
      sec.classList.add(e.clientY < rect.top + rect.height / 2 ? 'cat-drop-before' : 'cat-drop-after');
    });
    sec.addEventListener('dragleave', () => clearCatHighlights());
    sec.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragCatId || dragCatId === sec.dataset.catId) { clearCatHighlights(); return; }
      const rect = sec.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height / 2;
      const fromIdx = data.categories.findIndex(c => c.id === dragCatId);
      const [moved] = data.categories.splice(fromIdx, 1);
      const toIdx = data.categories.findIndex(c => c.id === sec.dataset.catId);
      data.categories.splice(before ? toIdx : toIdx + 1, 0, moved);
      save(); render();
    });
  });
}

function clearTileHighlights() {
  document.querySelectorAll('.tile').forEach(t => t.classList.remove('drop-before', 'drop-after'));
}
function clearCatHighlights() {
  document.querySelectorAll('.category').forEach(c => c.classList.remove('cat-drop-before', 'cat-drop-after'));
}

// ── APERÇU HOVER ─────────────────────────────────────
const tooltip   = document.getElementById('tileTooltip');
let ttTimer     = null;
const TT_DELAY  = 320; // ms avant apparition

function showTooltip(tile, anchorEl) {
  const fav  = getFaviconUrl(tile.url);
  const init = tile.name.trim().charAt(0).toUpperCase();
  const grad = tileGradient(tile.id);
  let host = '';
  try { host = new URL(tile.url).hostname; } catch {}

  let topHtml;
  if (tile.img) {
    topHtml = '<img class="tt-img" src="' + tile.img + '" alt="">';
  } else {
    topHtml = '<div class="tt-no-img" style="background:' + grad + '">' + init + '</div>';
  }

  const faviconTag = fav
    ? '<img class="tt-favicon" src="' + fav + '" alt="" onerror="this.style.display=\'none\'">'
    : '';

  tooltip.innerHTML =
    topHtml +
    '<div class="tt-body">' +
      faviconTag +
      '<div class="tt-info">' +
        '<div class="tt-name">' + tile.name + '</div>' +
        '<div class="tt-url">' + host + '</div>' +
      '</div>' +
    '</div>';

  positionTooltip(anchorEl);
  tooltip.classList.add('visible');
}

function positionTooltip(el) {
  const r  = el.getBoundingClientRect();
  const tw = 220;
  const th = 175; // hauteur estimée

  let left = r.left + r.width / 2 - tw / 2;
  let top  = r.top - th - 10;

  // Si ça sort à gauche/droite
  if (left < 8) left = 8;
  if (left + tw > window.innerWidth - 8) left = window.innerWidth - tw - 8;
  // Si ça sort en haut → afficher en dessous
  if (top < 8) top = r.bottom + 10;

  tooltip.style.left = left + 'px';
  tooltip.style.top  = top  + 'px';
}

function hideTooltip() {
  clearTimeout(ttTimer);
  tooltip.classList.remove('visible');
}

function bindTileTooltip(el, tile) {
  el.addEventListener('mouseenter', () => {
    clearTimeout(ttTimer);
    ttTimer = setTimeout(() => showTooltip(tile, el), TT_DELAY);
  });
  el.addEventListener('mouseleave', hideTooltip);
  el.addEventListener('click', hideTooltip);
}

// ── PALETTE DE COMMANDE ───────────────────────────────
let palSelIdx = 0;

function openPalette() {
  document.getElementById('paletteOverlay').classList.add('open');
  const inp = document.getElementById('paletteInput');
  inp.value = '';
  buildPaletteResults('');
  setTimeout(() => inp.focus(), 40);
}

function closePalette() {
  document.getElementById('paletteOverlay').classList.remove('open');
}

function hlMark(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function buildPaletteResults(query) {
  const q = query.trim().toLowerCase();
  const meta = document.getElementById('paletteMeta');
  const list = document.getElementById('paletteResults');

  const pool = q
    ? data.tiles.filter(t => t.name.toLowerCase().includes(q) || t.url.toLowerCase().includes(q))
    : [...data.tiles].sort((a, b) => {
        const ai = data.pinned.indexOf(a.id), bi = data.pinned.indexOf(b.id);
        if (ai !== -1 && bi !== -1) return ai - bi;
        if (ai !== -1) return -1;
        if (bi !== -1) return 1;
        return 0;
      }).slice(0, 10);

  palSelIdx = 0;
  meta.textContent = q
    ? pool.length + ' résultat' + (pool.length !== 1 ? 's' : '')
    : 'Accès rapide';

  if (!pool.length) {
    list.innerHTML = '<div class="pal-empty">Aucun raccourci trouvé</div>';
    return;
  }

  list.innerHTML = '';
  pool.forEach((tile, i) => {
    const cat  = data.categories.find(c => c.id === tile.cat);
    const grad = tileGradient(tile.id);
    const fav  = getFaviconUrl(tile.url);
    const init = tile.name.trim().charAt(0).toUpperCase();
    const pinned = data.pinned.includes(tile.id);

    let iconInner;
    if (tile.img) {
      iconInner = '<img src="' + tile.img + '" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:12px">';
    } else if (fav) {
      iconInner = '<img src="' + fav + '" alt="" onerror="this.outerHTML=\'<div class=pal-letter>' + init + '</div>\'">';
    } else {
      iconInner = '<div class="pal-letter">' + init + '</div>';
    }

    let host = '';
    try { host = new URL(tile.url).hostname; } catch {}

    const a = document.createElement('a');
    a.className = 'pal-item' + (i === 0 ? ' sel' : '');
    a.href = tile.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.dataset.idx = i;
    a.innerHTML =
      '<div class="pal-icon" style="background:' + grad + '">' + iconInner + '</div>' +
      '<div class="pal-info">' +
        '<div class="pal-name">' + hlMark(tile.name, query.trim()) + '</div>' +
        '<div class="pal-url">' + host + '</div>' +
      '</div>' +
      (pinned ? '<span class="pal-pinned-badge">★</span>' : '') +
      (cat ? '<span class="pal-cat">' + cat.name + '</span>' : '');

    a.addEventListener('click', () => closePalette());
    a.addEventListener('mouseenter', () => { palSelIdx = i; updatePalSel(); });
    list.appendChild(a);
  });
}

function updatePalSel() {
  document.querySelectorAll('.pal-item').forEach((el, i) => el.classList.toggle('sel', i === palSelIdx));
  const sel = document.querySelector('.pal-item.sel');
  if (sel) sel.scrollIntoView({ block: 'nearest' });
}

document.getElementById('paletteInput').addEventListener('input', e => buildPaletteResults(e.target.value));

document.getElementById('paletteInput').addEventListener('keydown', e => {
  const items = document.querySelectorAll('.pal-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); palSelIdx = (palSelIdx + 1) % items.length; updatePalSel(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); palSelIdx = (palSelIdx - 1 + items.length) % items.length; updatePalSel(); }
  else if (e.key === 'Enter') { e.preventDefault(); const s = document.querySelector('.pal-item.sel'); if (s) { window.open(s.href,'_blank'); closePalette(); } }
  else if (e.key === 'Escape') closePalette();
});

document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  const inField = tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA';
  if ((e.key === '/' && !inField) || ((e.ctrlKey || e.metaKey) && e.key === 'k')) {
    e.preventDefault(); openPalette();
  }
  if (e.key === 'Escape') closePalette();
});

// ── SERVICE WORKER ────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js?v=3').then(reg => {
    reg.update();
  }).catch(() => {});
}

// ── MODE ÉDITION GLOBAL ───────────────────────────────
let editMode = false;
function toggleEditMode() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  const btn = document.getElementById('editModeBtn');
  btn.classList.toggle('active', editMode);
  btn.innerHTML = editMode ? '✓ <span>Terminer</span>' : '✎ <span>Éditer</span>';
}

// ── RACCOURCIS CLAVIER ────────────────────────────────
function isInputActive() {
  const t = document.activeElement && document.activeElement.tagName;
  return t === 'INPUT' || t === 'TEXTAREA';
}

document.addEventListener('keydown', e => {
  if (isInputActive()) return;
  if (e.key === 'e' && !e.ctrlKey && !e.metaKey) { toggleEditMode(); return; }
  if (/^[1-6]$/.test(e.key) && !e.ctrlKey && !e.metaKey) {
    const idx = parseInt(e.key) - 1;
    const id  = data.pinned[idx];
    if (id) {
      const tile = data.tiles.find(t => t.id === id);
      if (tile) window.open(tile.url, '_blank', 'noopener');
    }
  }
});

// ── PAGER CATÉGORIES (swipe mobile) ───────────────────
function buildCatPager() {
  const pager = document.getElementById('catPager');
  if (!pager) return;
  const cats = [...document.querySelectorAll('.category')];
  if (cats.length <= 1) { pager.style.display = 'none'; return; }
  pager.innerHTML = '';
  cats.forEach((cat, i) => {
    const dot = document.createElement('div');
    dot.className = 'cat-pager-dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => cat.scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });
    pager.appendChild(dot);
  });

  const container = document.getElementById('categoriesContainer');
  container.addEventListener('scroll', () => {
    const w = container.offsetWidth;
    const idx = Math.round(container.scrollLeft / w);
    pager.querySelectorAll('.cat-pager-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  }, { passive: true });
}

// ── DRAG & DROP DOCK (réorganisation) ─────────────────
function initDockDrag(bar) {
  let dragId = null;
  let placeholder = null;

  bar.addEventListener('dragstart', e => {
    dragId = e.target.closest('.dock-item') && e.target.closest('.dock-item').dataset.tileId;
    if (!dragId) { e.preventDefault(); return; }
    setTimeout(() => e.target.closest('.dock-item') && (e.target.closest('.dock-item').style.opacity = '0.3'), 0);
  });

  bar.addEventListener('dragend', e => {
    const item = e.target.closest('.dock-item');
    if (item) item.style.opacity = '';
    if (placeholder) { placeholder.remove(); placeholder = null; }
    dragId = null;
  });

  bar.addEventListener('dragover', e => {
    e.preventDefault();
    const target = e.target.closest('.dock-item');
    if (!target || target.dataset.tileId === dragId) return;
    const rect = target.getBoundingClientRect();
    const after = e.clientX > rect.left + rect.width / 2;
    if (!placeholder) {
      placeholder = document.createElement('div');
      placeholder.style.cssText = 'width:4px;height:46px;background:var(--accent);border-radius:2px;flex-shrink:0';
    }
    bar.insertBefore(placeholder, after ? target.nextSibling : target);
  });

  bar.addEventListener('dragleave', e => {
    if (!bar.contains(e.relatedTarget) && placeholder) { placeholder.remove(); placeholder = null; }
  });

  bar.addEventListener('drop', e => {
    e.preventDefault();
    if (!dragId || !placeholder) return;
    const items = [...bar.querySelectorAll('.dock-item')];
    const placeholderIdx = [...bar.children].indexOf(placeholder);
    const insertBefore = items.find((it, i) => [...bar.children].indexOf(it) >= placeholderIdx);
    const fromIdx = data.pinned.indexOf(dragId);
    data.pinned.splice(fromIdx, 1);
    if (insertBefore) {
      const toId = insertBefore.dataset.tileId;
      const toIdx = data.pinned.indexOf(toId);
      data.pinned.splice(toIdx, 0, dragId);
    } else {
      data.pinned.push(dragId);
    }
    save();
    renderPinned();
  });
}

applyTheme(currentTheme);
buildThemeDots();
updateGreet();
updateClock();
updateDate();
setInterval(updateClock, 1000);
render();
